<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metalpatti Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 600px;
    }

    .chat-header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header .avatar {
      width: 42px;
      height: 42px;
      background: #gold;
      background: linear-gradient(135deg, #c8a96e, #f0d080);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-header .info h2 {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-header .info p {
      font-size: 12px;
      color: #a0c4a0;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    .message.bot {
      background: #f0f2f5;
      color: #1a1a2e;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .message.user {
      background: #1a1a2e;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message a {
      color: #c8a96e;
      word-break: break-all;
    }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
      background: #f0f2f5;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      width: fit-content;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: #999;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .chat-input {
      display: flex;
      padding: 14px;
      border-top: 1px solid #eee;
      gap: 10px;
      background: #fff;
    }

    .chat-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .chat-input input:focus {
      border-color: #1a1a2e;
    }

    .chat-input button {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .chat-input button:hover { background: #c8a96e; }
    .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🪙</div>
      <div class="info">
        <h2>Metalpatti Assistant</h2>
        <p>● Online</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        👋 Hi! I'm the Metalpatti assistant. Ask me about our products, designs, finishes, or request a catalog!
      </div>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://metalpatti-chatbot.onrender.com/chat';

    const input = document.getElementById('userInput');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('sendBtn');

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      if (type === 'bot' && text.includes('http')) {
        div.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
      } else {
        div.textContent = text;
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';
      sendBtn.disabled = true;
      showTyping();

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        removeTyping();
        const reply = data.reply + (data.catalog ? '\n' + data.catalog : '');
        addMessage(reply, 'bot');
      } catch (err) {
        removeTyping();
        addMessage('Sorry, something went wrong. Please try again.', 'bot');
      }

      sendBtn.disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
